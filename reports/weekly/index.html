<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Weekly Reports — BGeometrics</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:400,600,700">
<style>
  body { background:#0d0d0d; color:#e0e0e0; font-family:'Nunito',sans-serif; }
  .header { background:#000; border-bottom:1px solid #333; padding:0 20px; height:60px;
            display:flex; align-items:center; }
  .logo { display:flex; align-items:center; text-decoration:none; }
  .logo img { max-height:26px; margin-right:6px; }
  .logo span { font-size:22px; font-weight:700; color:#fff; }
  .logo span:hover { color:#a7f3d0; }
  .card { background:#1a1a1a; border:1px solid #2a2a2a; }
  .card-header { background:#111; border-bottom:1px solid #2a2a2a; }
  .table { color:#ccc; }
  .table thead th { color:#888; border-color:#2a2a2a; font-size:0.75rem;
                    text-transform:uppercase; letter-spacing:.4px; }
  .table td { border-color:#222; vertical-align:middle; }
  .table-hover tbody tr:hover { background:#222 !important; }
  .zone-badge { display:inline-block; padding:2px 10px; border-radius:12px;
                font-size:0.75rem; font-weight:700; }
  h2 { color:#f0f0f0; }
  .pct-positive { color:#2ecc71; }
  .pct-negative { color:#e74c3c; }
  a.report-link { color:#a7f3d0; text-decoration:none; font-weight:600; }
  a.report-link:hover { color:#fff; text-decoration:underline; }
</style>
</head>

          </tbody>
        </table>
      </div>

</div>
