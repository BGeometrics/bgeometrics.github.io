<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggestions</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">List of Suggestions</h1>

        <!-- Suggestions Table -->
        <table class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Suggestion</th>
                </tr>
            </thead>
            <tbody id="suggestionsTableBody">
                <!-- Rows will be inserted dynamically here -->
            </tbody>
        </table>
    </div>

    <!-- JavaScript -->
    <script>
        async function fetchSuggestions() {
            try {
                const response = await fetch('https://bitcoin-data.com/suggestion/api/suggestions');
                if (!response.ok) {
                    throw new Error('Failed to fetch suggestions');
                }

                const suggestions = await response.json();
                const tableBody = document.getElementById('suggestionsTableBody');
                tableBody.innerHTML = ''; // Clear existing rows

                suggestions.forEach((suggestion, index) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${suggestion.username || 'Anonymous'}</td>
                        <td>${suggestion.email || 'N/A'}</td>
                        <td>${suggestion.text}</td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Error fetching suggestions:', error);
            }
        }

        // Fetch suggestions on page load
        document.addEventListener('DOMContentLoaded', fetchSuggestions);
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
